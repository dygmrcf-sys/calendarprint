<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=210mm, initial-scale=1.0">
<title>Engagement Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,800;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #ffffff;
    --surface:   #ffffff;
    --card:      #ffffff;
    --border:    #d8d3cc;
    --border-dk: #b8b0a4;
    --gold:      #7a5c22;
    --gold-lt:   #9e7530;
    --gold-dk:   #4e3510;
    --gold-bg:   #fdf8ef;
    --red:       #b03020;
    --red-bg:    #fdf2f0;
    --green:     #1f6b4a;
    --green-bg:  #eef6f2;
    --blue:      #1a5490;
    --blue-bg:   #eef3fa;
    --muted:     #9a9088;
    --text:      #1a1410;
    --text-dim:  #6a5e54;
    --text-sub:  #8e8278;
    --rail:      #1e3050;
    --shadow:    0 1px 3px rgba(0,0,0,.07), 0 3px 10px rgba(0,0,0,.05);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html { background: #ddd; min-height: 100%; }

  @page { size: A4 portrait; margin: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    width: 210mm;
    min-height: 297mm;
    overflow-x: hidden;
    margin: 0 auto;
    box-shadow: 0 0 40px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
  }

  /* ── TRACK ── */
  .track-top {
    height: 5px;
    background: linear-gradient(90deg, var(--gold-dk), var(--gold-lt), var(--gold-dk));
    flex-shrink: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .track-stripe {
    height: 2px;
    background: repeating-linear-gradient(90deg,
      var(--rail) 0px, var(--rail) 20px,
      transparent 20px, transparent 28px);
    opacity: .18;
    flex-shrink: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* ── HEADER ── */
  header {
    background: var(--card);
    border-bottom: 2px solid var(--border-dk);
    padding: 14px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* Title block — official document style */
  .title-block {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .title-block .org-line {
    font-family: 'EB Garamond', serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .title-block h1 {
    font-family: 'EB Garamond', serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--rail);
    letter-spacing: .01em;
    line-height: 1.05;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .title-block .title-rule {
    margin-top: 5px;
    height: 1.5px;
    width: 100%;
    background: linear-gradient(90deg, var(--gold-lt), var(--border));
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .title-block .title-sub {
    margin-top: 4px;
    font-family: 'EB Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--text-dim);
    letter-spacing: .03em;
  }

  .header-right { text-align:right; }
  #date-display {
    font-family:'EB Garamond', serif;
    font-size:16px; font-weight:600;
    color: var(--text);
    letter-spacing:.01em;
  }
  #date-sub {
    font-size:20px; color:var(--text-sub);
    letter-spacing:.06em;
    margin-top:2px;
  }
  .sync-status {
    font-size:9px; color:var(--muted);
    margin-top:3px; letter-spacing:.04em;
  }
  .sync-dot {
    display:inline-block; width:6px; height:6px;
    border-radius:50%; background:var(--green);
    margin-right:4px; vertical-align:middle;
    animation: pulse 2s infinite;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .sync-dot.syncing { background:var(--gold-lt); }
  .sync-dot.error   { background:var(--red); animation:none; }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.4; } }

  /* ── MAIN ── */
  main {
    padding: 14px 20px 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  /* ── SECTION LABELS ── */
  .section-label {
    font-size:10px; font-weight:700;
    letter-spacing:.18em; text-transform:uppercase;
    color: var(--gold);
    margin-bottom:7px;
    display:flex; align-items:center; gap:8px;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .section-label::after {
    content:''; flex:1; height:1px;
    background: linear-gradient(90deg, var(--border-dk), transparent);
  }

  /* ── TODAY CARD ── */
  .today-card {
    background: var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    box-shadow: var(--shadow);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .today-header {
    background: linear-gradient(90deg, var(--rail) 0%, #1e3050 100%);
    padding:10px 16px;
    display:flex; align-items:center;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .today-date-badge {
    background: var(--gold-lt);
    color: #fff;
    font-family:'EB Garamond',serif;
    font-size:22px; font-weight:800;
    width:44px; height:44px;
    border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .today-meta { margin-left:12px; }
  .today-meta .day-name  { font-size:13px; font-weight:600; color:#fff; }
  .today-meta .month-year{ font-size:9px; color:rgba(255,255,255,.55); letter-spacing:.06em; margin-top:2px; }

  /* Today's list */
  .today-list { padding:8px 12px; }

  .engagement-row {
    display:flex; align-items:flex-start; gap:8px;
    padding:7px 8px; border-radius:7px;
    margin-bottom:3px;
    border-left:3px solid transparent;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .engagement-row.prio-high { border-color:var(--red); }
  .engagement-row.prio-med  { border-color:var(--gold-lt); }
  .engagement-row.prio-low  { border-color:var(--green); }

  .eng-time {
    font-family:'DM Mono',monospace;
    font-size:18px; color:var(--gold);
    white-space:nowrap; padding-top:2px;
    min-width:38px;
  }
  .eng-body { flex:1; }
  .eng-title { font-size:16px; font-weight:500; color:var(--text); line-height:1.3; }
  .eng-sub   { font-size:15px; color:var(--text-sub); margin-top:1px; }
  .eng-badge {
    font-size:16px; font-weight:600; letter-spacing:.05em;
    padding:2px 7px; border-radius:20px;
    text-transform:uppercase; flex-shrink:0;
    align-self:flex-start; margin-top:2px;
    border:1px solid;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .badge-meeting { background:var(--blue-bg);  color:var(--blue);  border-color:#ccdff6; }
  .badge-visit   { background:var(--green-bg); color:var(--green); border-color:#c2e5d6; }
  .badge-conf    { background:var(--gold-bg);  color:var(--gold);  border-color:#e8d9ba; }
  .badge-review  { background:var(--red-bg);   color:var(--red);   border-color:#f2c8c4; }
  .badge-other   { background:#f5f5f5;          color:var(--muted); border-color:var(--border); }

  .empty-state {
    text-align:center; padding:22px 16px;
    color:var(--muted); font-size:11px;
  }
  .empty-state .icon { font-size:22px; margin-bottom:6px; }

  /* ── UPCOMING PANEL ── */
  .upcoming-list {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:8px;
  }
  .upcoming-card {
    background: var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    padding:9px 10px 9px 13px;
    position:relative; overflow:hidden;
    box-shadow: var(--shadow-sm);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .upcoming-card .uc-stripe {
    position:absolute; top:0; left:0;
    width:4px; height:100%;
    border-radius:8px 0 0 8px;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .upcoming-card .uc-date  { font-family:'EB Garamond',serif; font-size:20px; font-weight:700; color:var(--text); }
  .upcoming-card .uc-month { font-size:9px; color:var(--text-sub); letter-spacing:.08em; text-transform:uppercase; }
  .upcoming-card .uc-title { font-size:11px; font-weight:500; margin-top:5px; color:var(--text); line-height:1.3; }
  .upcoming-card .uc-time  { font-family:'DM Mono',monospace; font-size:9px; color:var(--text-sub); margin-top:3px; }

  /* ── PRINT FOOTER ── */
  .print-footer {
    display: none;
    border-top: 1px solid var(--border);
    padding: 6px 24px;
    font-size: 9px;
    color: var(--text-sub);
    letter-spacing: .05em;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* ── SCREEN BOTTOM BAR ── */
  .bottom-bar {
    background: var(--card);
    border-top:1px solid var(--border);
    padding:7px 22px;
    display:flex; align-items:center; gap:10px;
    font-size:10px;
    color: var(--text-sub);
    flex-shrink: 0;
  }
  .bottom-bar .reload-info {
    margin-left:auto;
    font-family:'DM Mono',monospace;
    font-size:9px; color:var(--muted);
  }
  .btn-sm {
    background: var(--gold-bg);
    color: var(--gold-dk); font-weight:700; font-size:9px;
    letter-spacing:.06em; text-transform:uppercase;
    padding:4px 10px; border-radius:5px;
    border:1px solid rgba(122,92,34,.3);
    cursor:pointer; transition:background .2s;
  }
  .btn-sm:hover { background:#f0e4c8; }

  /* ── PRINT ── */
  @media print {
    html { background: #fff; }
    body { width:210mm; min-height:297mm; max-height:297mm; box-shadow:none; margin:0; overflow:hidden; }
    .bottom-bar { display: none !important; }
    .print-footer { display: flex; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }

  ::-webkit-scrollbar{width:3px;height:3px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border-dk);border-radius:3px;}
</style>
</head>
<body>

<script>
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/1sj4pPxk0cLVsJ12aUXnytWJuw1sxUVSRD2MOK4hTgAU/edit?gid=0#gid=0";
</script>

<div class="track-top"></div>
<div class="track-stripe"></div>

<header>
  <div class="title-block">
    <div class="org-line">Rail Coach Factory, Kapurthala &nbsp;·&nbsp; General Manager's Office</div>
    <h1>Engagement Schedule</h1>
  </div>
  <div class="header-right">
    <div id="date-display">Loading…</div>
    <div id="date-sub"></div>
    <div class="sync-status">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Initialising…</span>
    </div>
  </div>
</header>

<main>
  <!-- TODAY -->
  <div>
    <div class="section-label">Today's Schedule</div>
    <div class="today-card">
      <div class="today-header">
        <div class="today-date-badge" id="hdr-day">--</div>
        <div class="today-meta">
          <div class="day-name" id="hdr-dayname">---</div>
          <div class="month-year" id="hdr-monthyr">---</div>
        </div>
      </div>
      <div class="today-list" id="today-list">
        <div class="empty-state"><div class="icon">⏳</div>Loading schedule…</div>
      </div>
    </div>
  </div>

  <!-- UPCOMING -->
  <div>
    <div class="section-label">Upcoming Engagements</div>
    <div class="upcoming-list" id="upcoming-list">
      <div class="empty-state" style="grid-column:1/-1;text-align:center;padding:16px;">Loading…</div>
    </div>
  </div>
</main>

<div class="bottom-bar">
  <span>🚂 &nbsp;Auto-syncs every 10 minutes from Google Sheets</span>
  <button class="btn-sm" onclick="triggerReload()">⟳ Refresh Now</button>
  <button class="btn-sm" onclick="window.print()" style="margin-left:4px;">🖨 Print</button>
  <span class="reload-info" id="next-reload">Next sync: —</span>
</div>

<div class="print-footer">
  <span>🚂 GM Office, RCF Kapurthala — Engagement Schedule</span>
  <span id="print-date-footer"></span>
</div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SMONTH = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const RELOAD_INTERVAL_MS = 10 * 60 * 1000;

function pad(n){ return String(n).padStart(2,'0'); }

const NOW = new Date();

function getWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay()||7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date - yearStart) / 86400000) + 1)/7);
}

function updateDateDisplay(){
  const n = new Date();
  document.getElementById('date-display').textContent =
    `${DAYS[n.getDay()]}, ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  document.getElementById('date-sub').textContent =
    `Week ${getWeekNumber(n)} of ${n.getFullYear()}`;
  document.getElementById('print-date-footer').textContent =
    `Printed: ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
}
updateDateDisplay();
setInterval(updateDateDisplay, 60000);

document.getElementById('hdr-day').textContent     = NOW.getDate();
document.getElementById('hdr-dayname').textContent = DAYS[NOW.getDay()];
document.getElementById('hdr-monthyr').textContent = `${MONTHS[NOW.getMonth()]} ${NOW.getFullYear()}`;

function setSyncState(state, msg){
  document.getElementById('sync-dot').className = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
  document.getElementById('sync-label').textContent = msg;
}

let nextReloadAt = null;
function updateCountdown(){
  if(!nextReloadAt) return;
  const diff = Math.max(0, nextReloadAt - Date.now());
  const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
  document.getElementById('next-reload').textContent = `Next sync: ${pad(m)}:${pad(s)}`;
}
setInterval(updateCountdown, 1000);

let events = [];

function toLocalMidnight(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function todayMidnight(){ return toLocalMidnight(new Date()); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

function parseCSV(raw){
  const lines = raw.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return [];
  const header = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
  const idx = {
    date:     header.findIndex(h=>h==='date'),
    time:     header.findIndex(h=>h==='time'),
    title:    header.findIndex(h=>h.includes('title')||h.includes('engagement')||h.includes('subject')),
    location: header.findIndex(h=>h.includes('location')||h.includes('venue')||h.includes('place')),
    type:     header.findIndex(h=>h==='type'||h.includes('category')),
    priority: header.findIndex(h=>h.includes('priority')),
  };
  const parsed=[];
  for(let i=1;i<lines.length;i++){
    const cols=splitCSVLine(lines[i]);
    const dateStr=idx.date>=0?cols[idx.date]?.replace(/"/g,'').trim():'';
    if(!dateStr) continue;
    const d=parseDate(dateStr);
    if(!d||isNaN(d)) continue;
    parsed.push({
      date:d,
      time:     idx.time>=0    ?(cols[idx.time]||'').replace(/"/g,'').trim()    :'',
      title:    idx.title>=0   ?(cols[idx.title]||'').replace(/"/g,'').trim()   :'Engagement',
      location: idx.location>=0?(cols[idx.location]||'').replace(/"/g,'').trim():'',
      type:     idx.type>=0    ?(cols[idx.type]||'').replace(/"/g,'').trim()    :'Other',
      priority: idx.priority>=0?(cols[idx.priority]||'').replace(/"/g,'').trim().toLowerCase():'med',
    });
  }
  return parsed;
}

function splitCSVLine(line){
  const r=[]; let cur=''; let inQ=false;
  for(let c of line){ if(c==='"'){inQ=!inQ;} else if(c===','&&!inQ){r.push(cur);cur='';} else{cur+=c;} }
  r.push(cur); return r;
}

function parseDate(s){
  s=s.trim(); let m;
  if((m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/))) return new Date(+m[3],+m[2]-1,+m[1]);
  if((m=s.match(/^(\d{4})[\/\-](\d{2})[\/\-](\d{2})$/)))      return new Date(+m[1],+m[2]-1,+m[3]);
  if((m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/)))           return new Date(+m[3],+m[1]-1,+m[2]);
  const raw=new Date(s); if(!isNaN(raw)) return new Date(raw.getFullYear(),raw.getMonth(),raw.getDate());
  return null;
}

function convertGSheetUrl(url){
  if(!url||url.trim()==='YOUR_GOOGLE_SHEET_URL_HERE') return null;
  if(url.includes('output=csv')||url.includes('pub?')) return url;
  const m=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if(m){ const gid=(url.match(/[#&?]gid=(\d+)/)||[])[1]||'0'; return `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv&gid=${gid}`; }
  return url;
}

const PROXIES=[
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

async function fetchWithCORS(rawUrl){
  try{ const r=await fetch(rawUrl,{signal:AbortSignal.timeout(6000)}); if(r.ok) return await r.text(); }catch(_){}
  for(const proxy of PROXIES){
    try{
      const r=await fetch(proxy(rawUrl),{signal:AbortSignal.timeout(9000)});
      if(r.ok){ const text=await r.text(); if(text.trim().startsWith('{"contents"')) return JSON.parse(text).contents; return text; }
    }catch(_){}
  }
  throw new Error('All fetch attempts failed');
}

async function loadData(isAutoReload=false){
  const url=convertGSheetUrl(SHEET_URL);
  if(!url){ loadSample(); setSyncState('error','No sheet URL — showing sample data'); return; }
  setSyncState('syncing',isAutoReload?'Auto-syncing…':'Syncing…');
  try{
    const text=await fetchWithCORS(url);
    events=parseCSV(text); renderAll();
    const t=new Date(); setSyncState('ok',`Last synced ${pad(t.getHours())}:${pad(t.getMinutes())}`);
  }catch(e){ setSyncState('error',`Sync failed — ${e.message.slice(0,40)}`); loadSample(); }
  nextReloadAt=Date.now()+RELOAD_INTERVAL_MS; updateCountdown();
}
function triggerReload(){ loadData(false); }
setInterval(()=>loadData(true),RELOAD_INTERVAL_MS);

function typeClass(t){ const tl=(t||'').toLowerCase(); if(tl.includes('meet')) return 'badge-meeting'; if(tl.includes('visit')||tl.includes('inspect')) return 'badge-visit'; if(tl.includes('conf')||tl.includes('seminar')||tl.includes('workshop')) return 'badge-conf'; if(tl.includes('review')||tl.includes('audit')) return 'badge-review'; return 'badge-other'; }
function prioClass(p){ const pl=(p||'').toLowerCase(); if(pl==='high') return 'prio-high'; if(pl==='low') return 'prio-low'; return 'prio-med'; }
function stripeColor(t){ const tl=(t||'').toLowerCase(); if(tl.includes('visit')||tl.includes('inspect')) return 'var(--green)'; if(tl.includes('conf')||tl.includes('seminar')) return 'var(--gold-lt)'; if(tl.includes('review')||tl.includes('audit')) return 'var(--red)'; return 'var(--blue)'; }

function renderAll(){
  const today=new Date();
  const todayEvts=events.filter(e=>sameDay(e.date,today)).sort((a,b)=>a.time.localeCompare(b.time));

  const tl=document.getElementById('today-list');
  if(!todayEvts.length){
    tl.innerHTML='<div class="empty-state"><div class="icon">✅</div>No engagements scheduled today.</div>';
  } else {
    tl.innerHTML=todayEvts.map(e=>`
      <div class="engagement-row ${prioClass(e.priority)}">
        <div class="eng-time">${e.time||'--:--'}</div>
        <div class="eng-body">
          <div class="eng-title">${e.title}</div>
          ${e.location?`<div class="eng-sub">📍 ${e.location}</div>`:''}
        </div>
        <span class="eng-badge ${typeClass(e.type)}">${e.type||'Other'}</span>
      </div>`).join('');
  }

  const todayMid=todayMidnight();
  const upcoming=events.filter(e=>toLocalMidnight(e.date)>todayMid).sort((a,b)=>a.date-b.date||a.time.localeCompare(b.time)).slice(0,6);

  const ul=document.getElementById('upcoming-list');
  if(!upcoming.length){
    ul.innerHTML='<div class="empty-state" style="grid-column:1/-1;text-align:center;padding:16px;">No upcoming engagements</div>';
  } else {
    ul.innerHTML=upcoming.map(e=>`
      <div class="upcoming-card">
        <div class="uc-stripe" style="background:${stripeColor(e.type)}"></div>
        <div class="uc-date">${e.date.getDate()}</div>
        <div class="uc-month">${SMONTH[e.date.getMonth()]} ${e.date.getFullYear()}</div>
        <div class="uc-title">${e.title}</div>
        <div class="uc-time">${e.time||'Time TBD'} ${e.location?'• '+e.location:''}</div>
      </div>`).join('');
  }
}
