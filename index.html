<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=210mm, initial-scale=1.0">
<title>Engagement Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #fafafa;
    --border: #e8e8e8;
    --border-strong: #d0d0d0;
    --text: #0a0a0a;
    --text-2: #4a4a4a;
    --text-3: #9a9a9a;
    --accent: #0a0a0a;
    --red: #c0392b;
    --amber: #b8860b;
    --green: #1a6b3a;
    --blue: #1a4a8a;
    --badge-red-bg: #fef2f2; --badge-red-txt: #991b1b;
    --badge-amber-bg: #fffbeb; --badge-amber-txt: #92400e;
    --badge-green-bg: #f0fdf4; --badge-green-txt: #14532d;
    --badge-blue-bg: #eff6ff; --badge-blue-txt: #1e3a8a;
    --badge-gray-bg: #f4f4f4; --badge-gray-txt: #4a4a4a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { background:#f0f0f0; }
  @page { size:A4 portrait; margin:0; }
  body {
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    width:210mm;
    min-height:297mm;
    margin:0 auto;
    box-shadow:0 0 60px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
  }

  /* HEADER */
  header {
    padding:28px 36px 24px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
  }
  .org-label {
    font-size:10px;
    font-weight:500;
    letter-spacing:.15em;
    text-transform:uppercase;
    color:var(--text-3);
    margin-bottom:8px;
  }
  .brand-title {
    font-family:'Inter Tight', sans-serif;
    font-size:28px;
    font-weight:800;
    color:var(--text);
    letter-spacing:-.02em;
    line-height:1;
  }
  .header-right { text-align:right; }
  #date-display {
    font-family:'Inter Tight', sans-serif;
    font-size:15px;
    font-weight:600;
    color:var(--text);
  }
  #date-sub {
    font-size:11px;
    color:var(--text-3);
    margin-top:3px;
    letter-spacing:.05em;
  }
  .sync-row {
    display:flex;
    align-items:center;
    gap:5px;
    margin-top:6px;
    justify-content:flex-end;
  }
  .sync-dot {
    width:5px; height:5px;
    border-radius:50%;
    background:var(--green);
    flex-shrink:0;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  .sync-dot.syncing { background:var(--amber); }
  .sync-dot.error   { background:var(--red); }
  #sync-label { font-size:10px; color:var(--text-3); }

  /* MAIN */
  main { padding:28px 36px 20px; flex:1; display:flex; flex-direction:column; gap:28px; }

  /* SECTION HEADER */
  .section-head {
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .section-title {
    font-size:10px;
    font-weight:600;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--text-3);
  }

  /* TODAY AREA */
  .today-date-bar {
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:20px;
    padding-bottom:16px;
    border-bottom:1px solid var(--border);
  }
  .today-num {
    font-family:'Inter Tight', sans-serif;
    font-size:56px;
    font-weight:800;
    color:var(--text);
    line-height:1;
    letter-spacing:-.03em;
  }
  .today-dayblock { display:flex; flex-direction:column; gap:2px; }
  .today-dayname {
    font-family:'Inter Tight', sans-serif;
    font-size:18px;
    font-weight:700;
    color:var(--text);
    line-height:1;
  }
  .today-monthyr {
    font-size:12px;
    color:var(--text-3);
    font-weight:400;
  }
  #today-count {
    margin-left:auto;
    font-size:11px;
    color:var(--text-3);
    font-weight:400;
    align-self:flex-end;
    padding-bottom:2px;
  }

  /* ENGAGEMENT ROWS */
  .eng-list { display:flex; flex-direction:column; gap:1px; }

  .eng-row {
    display:flex;
    align-items:stretch;
    padding:13px 0;
    border-bottom:1px solid var(--border);
    gap:18px;
  }
  .eng-row:last-child { border-bottom:none; }

  .eng-prio-dot {
    width:6px; height:6px;
    border-radius:50%;
    flex-shrink:0;
    margin-top:5px;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  .prio-high .eng-prio-dot { background:var(--red); }
  .prio-med  .eng-prio-dot { background:var(--amber); }
  .prio-low  .eng-prio-dot { background:var(--green); }

  .eng-time {
    font-family:'Inter Tight', monospace;
    font-size:13px;
    font-weight:600;
    color:var(--text-3);
    min-width:44px;
    flex-shrink:0;
    padding-top:1px;
    letter-spacing:.02em;
  }

  .eng-content { flex:1; min-width:0; }
  .eng-title {
    font-size:13px;
    font-weight:600;
    color:var(--text);
    line-height:1.35;
  }
  .eng-location {
    font-size:11px;
    color:var(--text-3);
    margin-top:3px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .eng-badge {
    font-size:10px;
    font-weight:500;
    padding:3px 9px;
    border-radius:4px;
    white-space:nowrap;
    flex-shrink:0;
    align-self:center;
    letter-spacing:.02em;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  .badge-meeting { background:var(--badge-blue-bg);  color:var(--badge-blue-txt); }
  .badge-visit   { background:var(--badge-green-bg); color:var(--badge-green-txt); }
  .badge-conf    { background:var(--badge-amber-bg); color:var(--badge-amber-txt); }
  .badge-review  { background:var(--badge-red-bg);   color:var(--badge-red-txt); }
  .badge-other   { background:var(--badge-gray-bg);  color:var(--badge-gray-txt); }

  .empty-state {
    padding:24px 0;
    font-size:12px;
    color:var(--text-3);
    text-align:center;
  }

  /* UPCOMING GRID */
  .upcoming-grid {
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:1px;
    background:var(--border);
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
  }
  .uc-card {
    background:var(--bg);
    padding:14px 16px;
  }
  .uc-date-line {
    display:flex;
    align-items:baseline;
    gap:5px;
    margin-bottom:8px;
  }
  .uc-day {
    font-family:'Inter Tight', sans-serif;
    font-size:24px;
    font-weight:800;
    color:var(--text);
    line-height:1;
    letter-spacing:-.02em;
  }
  .uc-month {
    font-size:10px;
    font-weight:500;
    color:var(--text-3);
    letter-spacing:.06em;
    text-transform:uppercase;
  }
  .uc-title {
    font-size:11.5px;
    font-weight:600;
    color:var(--text);
    line-height:1.35;
    margin-bottom:4px;
  }
  .uc-meta {
    font-size:10px;
    color:var(--text-3);
  }
  .uc-typedot {
    display:inline-block;
    width:5px; height:5px;
    border-radius:50%;
    margin-right:4px;
    vertical-align:middle;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }

  /* BOTTOM BAR */
  .bottom-bar {
    border-top:1px solid var(--border);
    padding:10px 36px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:11px;
    color:var(--text-3);
  }
  .btn-sm {
    background:transparent;
    color:var(--text-2);
    font-size:11px;
    font-weight:500;
    padding:4px 10px;
    border-radius:5px;
    border:1px solid var(--border-strong);
    cursor:pointer;
  }
  .btn-sm:hover { background:var(--surface); }
  .reload-info { margin-left:auto; font-size:10px; color:var(--text-3); }

  .print-footer {
    display:none;
    border-top:1px solid var(--border);
    padding:8px 36px;
    font-size:9px;
    color:var(--text-3);
    justify-content:space-between;
  }

  @media print {
    html { background:#fff; }
    body { box-shadow:none; margin:0; overflow:hidden; max-height:297mm; }
    .bottom-bar { display:none !important; }
    .print-footer { display:flex; }
    * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
  }
</style>
</head>
<body>

<script>
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/1sj4pPxk0cLVsJ12aUXnytWJuw1sxUVSRD2MOK4hTgAU/edit?gid=0#gid=0";
</script>

<header>
  <div>
    <div class="org-label">Rail Coach Factory, Kapurthala &nbsp;·&nbsp; General Manager's Office</div>
    <div class="brand-title">Engagement Schedule</div>
  </div>
  <div class="header-right">
    <div id="date-display">Loading…</div>
    <div id="date-sub"></div>
    <div class="sync-row">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Initialising…</span>
    </div>
  </div>
</header>

<main>

  <div>
    <div class="section-head">
      <div class="section-title">Today</div>
    </div>
    <div class="today-date-bar">
      <div class="today-num" id="hdr-day">--</div>
      <div class="today-dayblock">
        <div class="today-dayname" id="hdr-dayname">---</div>
        <div class="today-monthyr" id="hdr-monthyr">---</div>
      </div>
      <div id="today-count">— engagements</div>
    </div>
    <div class="eng-list" id="today-list">
      <div class="empty-state">Loading schedule…</div>
    </div>
  </div>

  <div>
    <div class="section-head">
      <div class="section-title">Upcoming</div>
    </div>
    <div class="upcoming-grid" id="upcoming-list">
      <div class="empty-state" style="grid-column:1/-1;padding:20px;">Loading…</div>
    </div>
  </div>

</main>

<div class="bottom-bar">
  <span>Auto-syncs every 10 minutes from Google Sheets</span>
  <button class="btn-sm" onclick="triggerReload()">↺ Refresh</button>
  <button class="btn-sm" onclick="window.print()">Print</button>
  <span class="reload-info" id="next-reload">Next sync: —</span>
</div>

<div class="print-footer">
  <span>GM Office · RCF Kapurthala · Engagement Schedule</span>
  <span id="print-date-footer"></span>
</div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SMONTH = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const RELOAD_INTERVAL_MS = 10 * 60 * 1000;

function pad(n){ return String(n).padStart(2,'0'); }
const NOW = new Date();

function getWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay()||7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date - yearStart) / 86400000) + 1)/7);
}

function updateDateDisplay(){
  const n = new Date();
  document.getElementById('date-display').textContent =
    `${DAYS[n.getDay()]}, ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  document.getElementById('date-sub').textContent =
    `Week ${getWeekNumber(n)} · ${n.getFullYear()}`;
  document.getElementById('print-date-footer').textContent =
    `Printed: ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
}
updateDateDisplay();
setInterval(updateDateDisplay, 60000);

document.getElementById('hdr-day').textContent     = NOW.getDate();
document.getElementById('hdr-dayname').textContent = DAYS[NOW.getDay()];
document.getElementById('hdr-monthyr').textContent = `${MONTHS[NOW.getMonth()]} ${NOW.getFullYear()}`;

function setSyncState(state, msg){
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
  document.getElementById('sync-label').textContent = msg;
}

let nextReloadAt = null;
function updateCountdown(){
  if(!nextReloadAt) return;
  const diff = Math.max(0, nextReloadAt - Date.now());
  const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
  document.getElementById('next-reload').textContent = `Next sync: ${pad(m)}:${pad(s)}`;
}
setInterval(updateCountdown, 1000);

let events = [];

function toLocalMidnight(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function todayMidnight(){ return toLocalMidnight(new Date()); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

function parseCSV(raw){
  const lines = raw.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return [];
  const header = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
  const idx = {
    date:     header.findIndex(h=>h==='date'),
    time:     header.findIndex(h=>h==='time'),
    title:    header.findIndex(h=>h.includes('title')||h.includes('engagement')||h.includes('subject')),
    location: header.findIndex(h=>h.includes('location')||h.includes('venue')||h.includes('place')),
    type:     header.findIndex(h=>h==='type'||h.includes('category')),
    priority: header.findIndex(h=>h.includes('priority')),
  };
  const parsed=[];
  for(let i=1;i<lines.length;i++){
    const cols=splitCSVLine(lines[i]);
    const dateStr=idx.date>=0?cols[idx.date]?.replace(/"/g,'').trim():'';
    if(!dateStr) continue;
    const d=parseDate(dateStr);
    if(!d||isNaN(d)) continue;
    parsed.push({
      date:d,
      time:     idx.time>=0    ?(cols[idx.time]||'').replace(/"/g,'').trim()    :'',
      title:    idx.title>=0   ?(cols[idx.title]||'').replace(/"/g,'').trim()   :'Engagement',
      location: idx.location>=0?(cols[idx.location]||'').replace(/"/g,'').trim():'',
      type:     idx.type>=0    ?(cols[idx.type]||'').replace(/"/g,'').trim()    :'Other',
      priority: idx.priority>=0?(cols[idx.priority]||'').replace(/"/g,'').trim().toLowerCase():'med',
    });
  }
  return parsed;
}

function splitCSVLine(line){
  const r=[]; let cur=''; let inQ=false;
  for(let c of line){ if(c==='"'){inQ=!inQ;} else if(c===','&&!inQ){r.push(cur);cur='';} else{cur+=c;} }
  r.push(cur); return r;
}

function parseDate(s){
  s=s.trim(); let m;
  if((m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/))) return new Date(+m[3],+m[2]-1,+m[1]);
  if((m=s.match(/^(\d{4})[\/\-](\d{2})[\/\-](\d{2})$/)))      return new Date(+m[1],+m[2]-1,+m[3]);
  if((m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/)))           return new Date(+m[3],+m[1]-1,+m[2]);
  const raw=new Date(s); if(!isNaN(raw)) return new Date(raw.getFullYear(),raw.getMonth(),raw.getDate());
  return null;
}

function convertGSheetUrl(url){
  if(!url||url.trim()==='YOUR_GOOGLE_SHEET_URL_HERE') return null;
  if(url.includes('output=csv')||url.includes('pub?')) return url;
  const m=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if(m){ const gid=(url.match(/[#&?]gid=(\d+)/)||[])[1]||'0'; return `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv&gid=${gid}`; }
  return url;
}

const PROXIES=[
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

async function fetchWithCORS(rawUrl){
  try{ const r=await fetch(rawUrl,{signal:AbortSignal.timeout(6000)}); if(r.ok) return await r.text(); }catch(_){}
  for(const proxy of PROXIES){
    try{
      const r=await fetch(proxy(rawUrl),{signal:AbortSignal.timeout(9000)});
      if(r.ok){ const text=await r.text(); if(text.trim().startsWith('{"contents"')) return JSON.parse(text).contents; return text; }
    }catch(_){}
  }
  throw new Error('All fetch attempts failed');
}

async function loadData(isAutoReload=false){
  const url=convertGSheetUrl(SHEET_URL);
  if(!url){ loadSample(); setSyncState('error','No sheet URL — showing sample data'); return; }
  setSyncState('syncing',isAutoReload?'Auto-syncing…':'Syncing…');
  try{
    const text=await fetchWithCORS(url);
    events=parseCSV(text); renderAll();
    const t=new Date(); setSyncState('ok',`Synced ${pad(t.getHours())}:${pad(t.getMinutes())}`);
  }catch(e){ setSyncState('error',`Sync failed — ${e.message.slice(0,40)}`); loadSample(); }
  nextReloadAt=Date.now()+RELOAD_INTERVAL_MS; updateCountdown();
}
function triggerReload(){ loadData(false); }
setInterval(()=>loadData(true),RELOAD_INTERVAL_MS);

function typeClass(t){
  const tl=(t||'').toLowerCase();
  if(tl.includes('meet')) return 'badge-meeting';
  if(tl.includes('visit')||tl.includes('inspect')) return 'badge-visit';
  if(tl.includes('conf')||tl.includes('seminar')||tl.includes('workshop')) return 'badge-conf';
  if(tl.includes('review')||tl.includes('audit')) return 'badge-review';
  return 'badge-other';
}
function prioClass(p){
  const pl=(p||'').toLowerCase();
  if(pl==='high') return 'prio-high';
  if(pl==='low')  return 'prio-low';
  return 'prio-med';
}
function typeColor(t){
  const tl=(t||'').toLowerCase();
  if(tl.includes('visit')||tl.includes('inspect')) return '#1a6b3a';
  if(tl.includes('conf')||tl.includes('seminar'))  return '#b8860b';
  if(tl.includes('review')||tl.includes('audit'))  return '#c0392b';
  if(tl.includes('meet')) return '#1a4a8a';
  return '#9a9a9a';
}

function renderAll(){
  const today=new Date();
  const todayEvts=events.filter(e=>sameDay(e.date,today)).sort((a,b)=>a.time.localeCompare(b.time));

  const countEl = document.getElementById('today-count');
  if(countEl) countEl.textContent = todayEvts.length===0?'No engagements today':`${todayEvts.length} engagement${todayEvts.length!==1?'s':''}`;

  const tl=document.getElementById('today-list');
  if(!todayEvts.length){
    tl.innerHTML='<div class="empty-state">No engagements scheduled today.</div>';
  } else {
    tl.innerHTML=todayEvts.map(e=>`
      <div class="eng-row ${prioClass(e.priority)}">
        <div class="eng-prio-dot"></div>
        <div class="eng-time">${e.time||'--:--'}</div>
        <div class="eng-content">
          <div class="eng-title">${e.title}</div>
          ${e.location?`<div class="eng-location">${e.location}</div>`:''}
        </div>
        <span class="eng-badge ${typeClass(e.type)}">${e.type||'Other'}</span>
      </div>`).join('');
  }

  const todayMid=todayMidnight();
  const upcoming=events.filter(e=>toLocalMidnight(e.date)>todayMid).sort((a,b)=>a.date-b.date||a.time.localeCompare(b.time)).slice(0,6);

  const ul=document.getElementById('upcoming-list');
  if(!upcoming.length){
    ul.innerHTML='<div class="empty-state" style="grid-column:1/-1;padding:20px;">No upcoming engagements</div>';
  } else {
    ul.innerHTML=upcoming.map(e=>`
      <div class="uc-card">
        <div class="uc-date-line">
          <div class="uc-day">${e.date.getDate()}</div>
          <div class="uc-month">${SMONTH[e.date.getMonth()]} ${e.date.getFullYear()}</div>
        </div>
        <div class="uc-title">${e.title}</div>
        <div class="uc-meta">
          <span class="uc-typedot" style="background:${typeColor(e.type)}"></span>${e.time||'TBD'}${e.location?' · '+e.location:''}
        </div>
      </div>`).join('');
  }
}

function loadSample(){
  const n=new Date(); const y=n.getFullYear(),mo=n.getMonth(),nd=n.getDate();
  const d=(day)=>new Date(y,mo,day); const t=(h,m)=>`${pad(h)}:${pad(m)}`;
  events=[
    {date:d(nd),   time:t(9,30), title:'Divisional Managers Briefing',                   location:'Conference Room A, HQ',         type:'Meeting',   priority:'high'},
    {date:d(nd),   time:t(11,0), title:'Infrastructure Review — Goods Shed Modernisation',location:'Yard Office',                   type:'Review',    priority:'high'},
    {date:d(nd),   time:t(14,0), title:'Parliamentary Committee Interaction (Virtual)',   location:'Video Conference',               type:'Conference',priority:'med'},
    {date:d(nd),   time:t(16,30),title:'Press Briefing — New Train Services',             location:'Media Centre',                   type:'Other',     priority:'med'},
    {date:d(nd+1), time:t(10,0), title:'Site Visit — Platform Expansion, Ambala',         location:'Ambala Station',                 type:'Site Visit',priority:'high'},
    {date:d(nd+2), time:t(9,0),  title:'Safety Audit — Loco Maintenance Depot',           location:'Ludhiana Depot',                 type:'Review',    priority:'high'},
    {date:d(nd+3), time:t(11,30),title:'Staff Welfare Meeting',                           location:'Training Institute, Chandigarh', type:'Meeting',   priority:'low'},
